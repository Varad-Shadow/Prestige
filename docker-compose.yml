version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: apex_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - apex_network

  backend:
    build:
      context: ./backend
    container_name: apex_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=${PORT:-5000}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/apex_prestige}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV:-development}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173,http://localhost}
    depends_on:
      - mongodb
    networks:
      - apex_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    container_name: apex_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - apex_network

volumes:
  mongodb_data:

networks:
  apex_network:
    driver: bridge
